name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Screenshots welcome.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /dashboard
        2. Click "Optimize"
        3. Observe...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: "main @ a1b2c3d, or release v0.1.0"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
      default: 0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Self-hosted (dev server)
        - Self-hosted (Docker)
        - Self-hosted (Vercel / Netlify)
        - Hosted vanara.ai
      default: 0
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console / network errors
      description: Redact any API keys before pasting.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have redacted any API keys or PII from this report
          required: true
