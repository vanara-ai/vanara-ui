version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      next-stack:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      supabase-stack:
        patterns:
          - "@supabase/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
